name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: typecheck · lint · test
    runs-on: ubuntu-latest

    # A real Postgres 16 service for integration tests. The runner also has Docker
    # available, so tests may alternatively spin up their own containers via
    # Testcontainers (WU-1+). Either way, mock-only DB coverage is rejected.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: openmdim
          POSTGRES_PASSWORD: openmdim
          POSTGRES_DB: openmdim
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U openmdim -d openmdim"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://openmdim:openmdim@localhost:5432/openmdim?schema=public
      DIRECT_URL: postgresql://openmdim:openmdim@localhost:5432/openmdim?schema=public
      REDIS_URL: redis://localhost:6379

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # The generated Prisma client is gitignored; regenerate before typecheck/test.
      - name: Generate Prisma client
        run: pnpm --filter @openmdim/db run db:generate

      - name: Typecheck
        run: pnpm run typecheck

      - name: Lint (incl. import-boundary)
        run: pnpm lint

      - name: Test
        run: pnpm test

      # Enforce changed-file coverage thresholds (U.3) — fails CI if below 80/70.
      - name: Coverage gate
        run: pnpm --filter @openmdim/api run test:coverage
